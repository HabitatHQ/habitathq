<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitat HQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --fg: #0f172a;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --card-hover-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --accent-habitat: #06b6d4;
            --accent-hearth: #f59e0b;
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --fg: #f8fafc;
                --card-bg: #0f172a;
                --card-border: #1e293b;
                --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: #64748b;
            margin-bottom: 3rem;
        }

        @media (prefers-color-scheme: dark) {
            p.subtitle {
                color: #94a3b8;
            }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            text-decoration: none;
            color: inherit;
            text-align: left;
            transition: transform 200ms var(--ease-out), box-shadow 200ms var(--ease-out), border-color 200ms var(--ease-out);
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--card-hover-shadow);
            border-color: var(--accent);
        }

        .card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .card-habitat { --accent: var(--accent-habitat); }
        .card-hearth { --accent: var(--accent-hearth); }

        .icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            background: var(--accent);
            color: white;
            margin-bottom: 0.5rem;
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card p {
            color: #64748b;
            font-size: 1rem;
        }

        @media (prefers-color-scheme: dark) {
            .card p {
                color: #94a3b8;
            }
        }

        .arrow {
            position: absolute;
            bottom: 2.5rem;
            right: 2.5rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 200ms var(--ease-out);
            color: var(--accent);
        }

        .card:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        footer {
            margin-top: 4rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Habitat HQ</h1>
        <p class="subtitle">Local-first, privacy-focused apps for your daily life.</p>
        
        <div class="grid">
            <a href="./habitat/" class="card card-habitat">
                <div class="icon">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </div>
                <h2>Habitat</h2>
                <p>Personal habit tracker that lives entirely on your device. No servers, no accounts.</p>
                <div class="arrow">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            </a>

            <a href="./hearth/" class="card card-hearth">
                <div class="icon">
                    <svg viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.5 4 6.5 2 2 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
                </div>
                <h2>Hearth</h2>
                <p>Personal & family expense tracker with envelope budgeting and split IOUs.</p>
                <div class="arrow">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            </a>
        </div>

        <footer>
            &copy; 2026 Habitat HQ
        </footer>
    </div>
</body>
</html>
