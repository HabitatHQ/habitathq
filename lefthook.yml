pre-commit:
  parallel: true
  commands:
    biome:
      glob: "**/*.{ts,tsx,js,jsx,json}"
      run: pnpm exec biome check --no-errors-on-unmatched {staged_files}
    clippy:
      glob: "**/*.rs"
      run: cargo clippy --workspace -- -D warnings
    taplo:
      glob: "**/*.toml"
      run: taplo fmt --check {staged_files}
    prettier-yaml:
      glob: "**/*.{yml,yaml}"
      exclude: "pnpm-lock.yaml"
      run: pnpm exec prettier --check {staged_files}
    large-files:
      exclude: "pnpm-lock.yaml"
      run: |
        limit=524288
        ok=true
        for f in {staged_files}; do
          size=$(wc -c < "$f" 2>/dev/null || echo 0)
          if [ "$size" -gt "$limit" ]; then
            echo "❌  $f is $(( size / 1024 ))KB — limit is 512KB"
            ok=false
          fi
        done
        $ok
    semgrep:
      glob: "**/*.{ts,tsx,js,jsx,vue}"
      exclude: "**/.nuxt/**"
      run: |
        if command -v semgrep >/dev/null 2>&1; then
          semgrep scan --config semgrep.yml --metrics=off --error --severity=ERROR --quiet {staged_files}
        else
          echo "⚠  semgrep not installed — skipping (install: brew install semgrep)"
        fi
    manifest-edit:
      glob: "**/package.json"
      run: |
        # If package.json {dependencies,devDependencies,peerDependencies} diff is
        # present without a corresponding pnpm-lock.yaml diff, the LLM hand-edited
        # the manifest. Add deps via `pnpm add` instead (see global CLAUDE.md).
        ok=true
        for f in {staged_files}; do
          if git diff --cached --unified=0 "$f" | grep -qE '^\+\s*"(dependencies|devDependencies|peerDependencies)"|^\+\s*"[@a-zA-Z0-9/_-]+"\s*:\s*"\^?[~]?[0-9]'; then
            if ! git diff --cached --name-only | grep -q '^pnpm-lock\.yaml$'; then
              echo "❌  $f has dependency edits but pnpm-lock.yaml is not staged."
              echo "    Use \`pnpm add <pkg>\` instead of hand-editing package.json."
              ok=false
            fi
          fi
        done
        $ok

pre-push:
  parallel: true
  commands:
    deps:
      run: pnpm lint:deps

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(cat {1})
        pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,100}$'
        if ! echo "$msg" | grep -qE "$pattern"; then
          echo "❌ Commit message must follow Conventional Commits format."
          echo "   Examples: feat(core): add sync protocol, fix(react): resolve hook ordering"
          exit 1
        fi
