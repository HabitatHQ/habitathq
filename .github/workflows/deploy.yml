name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "apps/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages-${{ github.event.pull_request.number || 'main' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine deploy prefix
        id: prefix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "path=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            # sanitize branch name for URL
            slug=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "path=${slug}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all apps
        run: |
          PREFIX="${{ steps.prefix.outputs.path }}"
          for app in habitat hearth halcyon hephaestus; do
            echo "Building $app..."
            NUXT_APP_BASE_URL="/habitathq/$PREFIX/$app/" pnpm --filter "$app" build:pwa
          done

      - name: Combine outputs
        run: |
          PREFIX="${{ steps.prefix.outputs.path }}"
          mkdir -p "_site/$PREFIX"
          for app in habitat hearth halcyon hephaestus; do
            cp -r "apps/$app/.output/public" "_site/$PREFIX/$app"
          done
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: preview-pr-${{ github.event.pull_request.number }}
          path: _site
          retention-days: 7

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
