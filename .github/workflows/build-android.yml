name: Build Android

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to build"
        required: true
        type: choice
        options:
          - habitat
          - hearth
          - halcyon
          - hephaestus

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets and sync
        run: pnpm --filter ${{ inputs.app }} build:native

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ inputs.app }}-${{ hashFiles('apps/${{ inputs.app }}/android/**/*.gradle*') }}
          restore-keys: gradle-${{ inputs.app }}-

      - name: Make gradlew executable
        run: chmod +x apps/${{ inputs.app }}/android/gradlew

      - name: Build debug APK
        run: cd apps/${{ inputs.app }}/android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app }}-debug-${{ github.run_number }}
          path: apps/${{ inputs.app }}/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
