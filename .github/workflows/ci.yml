name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [habitat, hearth, halcyon, hephaestus]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps
        run: |
          pnpm --filter "@palladium/core" build
          pnpm --filter "@palladium/sqlite-browser" build
          pnpm --filter "@palladium/sqlite-capacitor" build
          pnpm --filter "@palladium/nuxt" build

      - name: Prepare (generate tsconfig)
        run: pnpm --filter ${{ matrix.app }} exec nuxt prepare

      - name: Lint & format check
        run: pnpm --filter ${{ matrix.app }} check

      - name: Typecheck
        run: pnpm --filter ${{ matrix.app }} typecheck

      - name: Unit tests
        run: pnpm --filter ${{ matrix.app }} test:unit
